name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # main에 push하면 배포

permissions:
  contents: read
  pages: write
  id-token: write

jobs: # CI/CD 파이프라인의 작업 묶음
  build:
    runs-on: ubuntu-latest # 빌드 환경

    steps:
      # 1. 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Node 설치
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # 3. 의존성 설치
      - name: Install dependencies
        run: npm install

      # 4. 빌드
      - name: Build
        run: npm run build

      # 5. Pages용 파일 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # 6. Pages 배포
      - name: Deploy
        uses: actions/deploy-pages@v2
